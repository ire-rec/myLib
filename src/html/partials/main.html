<main class="main">
    <form 
    action="https://adalab-server-form.herokuapp.com/" 
    method="get" 
    class="main__form"> 
        <div>
            <label 
            for="title"
            class="main__form--labelTitle"> Title or author</label>
            <input 
            type="text" 
            id="title" 
            name="title" 
            placeholder=" Ex: Agatha Christie"
            required
            class="main__form--inputTitle inputTitle_js">
        </div>
        <div>
            <label 
            for="submit"
            class="main__form--labelSearch"></label>
            <input 
            type="submit" 
            value="Find my book!"
            class="main__form--inputSearch inputSearch_js">
        </div>
    </form>
</main>
